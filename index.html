<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>喵呜 - 猫咪健康管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.8;
      color: #333;
      background-color: #f8f9fa;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
      background-color: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .app-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 50px;
      box-shadow: 0 8px 24px rgba(255, 107, 107, 0.3);
    }

    .app-name {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .app-slogan {
      font-size: 16px;
      color: #888;
      margin-bottom: 40px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-item {
      display: block;
      padding: 16px 24px;
      background-color: #f8f9fa;
      border-radius: 12px;
      text-decoration: none;
      color: #333;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s ease;
      border: 1px solid #eee;
    }

    .link-item:hover {
      background-color: #fff0f0;
      border-color: #FF6B6B;
      color: #FF6B6B;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.15);
    }

    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: #bbb;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .container {
        padding: 32px 24px;
      }

      .app-name {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="app-icon">🐾</div>
    <h1 class="app-name">喵呜</h1>
    <p class="app-slogan">用心呵护每一只喵星人 🐱</p>

    <div class="links">
      <a href="privacy-policy.html" class="link-item">📋 隐私政策</a>
      <a href="terms-of-service.html" class="link-item">📄 用户服务协议</a>
    </div>

    <div class="footer">
      <p>© 2026 喵呜 All Rights Reserved.</p>
      <p>联系邮箱：1909201033@qq.com</p>
    </div>
  </div>
</body>

</html>
